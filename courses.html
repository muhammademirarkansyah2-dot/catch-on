<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses & Packages - LinguaPath</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Lingua<span>Path</span></a>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="courses.html" class="nav-link" style="color: var(--primary); font-weight: 700;">Courses</a>
                <a href="quiz.html" class="nav-link">Quizzes</a>
                <a href="progress.html" class="nav-link">Dashboard</a>
                <a href="leaderboard.html" class="nav-link">Leaderboard</a>
                <a href="contact.html" class="nav-link">Contact</a>
                <a href="login.html" class="btn btn-outline btn-sm">Login</a>
                <button class="theme-toggle" id="theme-toggle">🌙</button>
            </div>
            <button class="btn btn-outline btn-sm hidden" id="menu-toggle">Menu</button>
        </div>
    </nav>

    <div style="padding-top: 100px;"></div>

    <section class="section">
        <div class="container">
            <div class="text-center" style="margin-bottom: 3rem;">
                <h1 class="reveal">Course Catalog</h1>
                <p class="reveal">Comprehensive preparation programs for your success</p>
                <div class="reveal" style="margin-top: 2rem;">
                    <select id="course-filter" class="fill-input" style="max-width: 300px; display: inline-block;" onchange="App.renderCourses()">
                        <option value="all">All Programs</option>
                        <option value="IELTS">IELTS</option>
                        <option value="TOEFL">TOEFL</option>
                        <option value="TOEP">TOEP</option>
                        <option value="General">General English</option>
                    </select>
                </div>
            </div>
            <div id="courses-grid" class="grid"></div>
        </div>
    </section>

    <section class="section" style="background: var(--bg-secondary);">
        <div class="container">
            <div class="text-center" style="margin-bottom: 4rem;">
                <h2 class="reveal">Subscription Packages</h2>
                <p class="reveal">Choose the best plan for your learning journey</p>
            </div>
            <div id="pricing-grid" class="grid" style="align-items: center;"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="container text-center">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem; color: white;">Lingua<span style="color: #FFD166;">Path</span></a>
            <p>&copy; 2026 LinguaPath. All rights reserved.</p>
        </div>
    </footer>

    <div id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/gamification.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
