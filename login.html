<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - catch on</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, rgba(70, 44, 125, 0.05) 0%, rgba(213, 82, 163, 0.05) 100%); padding: 2rem; }
        .auth-card { background: var(--bg-primary); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 450px; padding: 3rem; border: 1px solid var(--border); }
        .auth-header { text-align: center; margin-bottom: 2.5rem; }
        .auth-logo { font-family: var(--font-heading); font-size: 2rem; font-weight: 700; color: var(--primary); display: inline-block; margin-bottom: 0.5rem; }
        .auth-logo span { color: var(--accent); }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-control { width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--border); border-radius: var(--radius-md); font-family: var(--font-body); font-size: 1rem; background: var(--bg-secondary); color: var(--text-primary); transition: border-color 0.3s; }
        .form-control:focus { outline: none; border-color: var(--primary); }
        .auth-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.875rem; }
        .social-login { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border); text-align: center; }
        .social-btn { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); font-weight: 500; cursor: pointer; transition: background 0.3s; margin-bottom: 1rem; }
        .social-btn:hover { background: var(--bg-secondary); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animate-scale">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">Catch<span>on</span></a>
                <p style="color: var(--text-secondary);">Welcome back! Please login to your account.</p>
            </div>
            
            <form onsubmit="event.preventDefault(); window.location.href='progress.html';">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" value="student@catch on.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" value="password123" required>
                </div>
                
                <div class="auth-actions">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" checked> Remember me
                    </label>
                    <a href="#" style="font-weight: 500;">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.125rem;">Sign In</button>
            </form>
            
            <div class="social-login">
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.875rem;">Or continue with</p>
                <button class="social-btn">
                    <span>G</span> Sign in with Google
                </button>
                <p style="margin-top: 1.5rem; font-size: 0.875rem;">
                    Don't have an account? <a href="#" style="font-weight: 600;">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
